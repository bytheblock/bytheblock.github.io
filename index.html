<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>By the Block Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .legend {
      background: rgba(255,255,255,0.95);
      padding: 10px 12px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      font-size: 14px;
      line-height: 1.4;
    }

    .legend-row {
      display: flex;
      align-items: center;
      margin: 4px 0;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border-radius: 3px;
      flex: 0 0 14px;
    }

    .popup-link {
      display: inline-block;
      margin-top: 6px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const map = L.map('map').setView([40.7308, -73.9973], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    const colors = {
      green: '#2e7d32',
      yellow: '#c9a227',
      red: '#c62828'
    };

    const blocks = {
      "type": "FeatureCollection",
      "features": [
        {
          "type": "Feature",
          "properties": {
            "title": "Example Block",
            "rating": "green",
            "url": "https://bytheblock.net/"
          },
          "geometry": {
            "type": "LineString",
            "coordinates": [
              [-73.977929, 40.748923],
              [-73.979353, 40.749537]
            ]
          }
        }
      ]
    };

    function styleFeature(feature) {
      const rating = feature.properties.rating || 'yellow';
      return {
        color: colors[rating],
        weight: 6,
        opacity: 0.9,
        lineCap: 'round'
      };
    }

    let geojsonLayer;

    function onEachFeature(feature, layer) {
      const props = feature.properties;
      const popupHtml = `
        <div>
          <div><strong>${props.title}</strong></div>
          <a class="popup-link" href="${props.url}" target="_blank" rel="noopener noreferrer">
            Read post
          </a>
        </div>
      `;
      layer.bindPopup(popupHtml);

      layer.on('mouseover', function () {
        layer.setStyle({ weight: 8, opacity: 1 });
      });

      layer.on('mouseout', function () {
        geojsonLayer.resetStyle(layer);
      });
    }

    geojsonLayer = L.geoJSON(blocks, {
      style: styleFeature,
      onEachFeature: onEachFeature
    }).addTo(map);

    map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });

    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <div><strong>Blocks covered</strong></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#2e7d32;"></span>Standout</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#c9a227;"></span>Solid</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#c62828;"></span>Mixed</div>
      `;
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
